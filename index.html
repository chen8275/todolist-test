<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    .container {
      width: 100%;
      max-width: 560px;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      color: #333;
      margin-bottom: 24px;
      letter-spacing: 2px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #4a90e2; }
    .input-row button {
      padding: 12px 20px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .input-row button:hover { background: #357abd; }
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      justify-content: center;
    }
    .filters button {
      padding: 6px 16px;
      border: 2px solid #ddd;
      border-radius: 20px;
      background: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      color: #555;
      transition: all 0.2s;
    }
    .filters button.active {
      border-color: #4a90e2;
      color: #4a90e2;
      font-weight: 600;
    }
    .todo-list {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .todo-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      gap: 12px;
      transition: background 0.15s;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item:hover { background: #fafafa; }
    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4a90e2;
      flex-shrink: 0;
    }
    .todo-text {
      flex: 1;
      font-size: 1rem;
      color: #333;
      word-break: break-all;
      outline: none;
    }
    .todo-text.done {
      text-decoration: line-through;
      color: #aaa;
    }
    .todo-text[contenteditable="true"] {
      border-bottom: 1px dashed #4a90e2;
      padding-bottom: 2px;
    }
    .item-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .item-actions button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 6px;
      border-radius: 4px;
      transition: background 0.15s;
      color: #888;
    }
    .item-actions button:hover { background: #f0f0f0; color: #333; }
    .item-actions .del-btn:hover { color: #e74c3c; }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #888;
      background: #fff;
      border-top: 1px solid #f0f0f0;
    }
    .footer button {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .footer button:hover { background: #ffeaea; }
    .empty {
      text-align: center;
      padding: 40px 0;
      color: #bbb;
      font-size: 0.95rem;
    }
    .priority-select {
      border: none;
      background: none;
      font-size: 1rem;
      cursor: pointer;
      outline: none;
      padding: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>待办事项</h1>
    <div class="input-row">
      <input id="newTodo" type="text" placeholder="添加新任务，按 Enter 或点击添加" maxlength="200">
      <button onclick="addTodo()">添加</button>
    </div>
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">全部</button>
      <button onclick="setFilter('active', this)">未完成</button>
      <button onclick="setFilter('done', this)">已完成</button>
    </div>
    <div class="todo-list" id="todoList"></div>
    <div class="footer" id="footer" style="display:none">
      <span id="countInfo"></span>
      <button onclick="clearDone()">清除已完成</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';
    let editingId = null;

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('todoList');
      const footer = document.getElementById('footer');
      const filtered = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">暂无任务</div>';
      } else {
        list.innerHTML = filtered.map(t => `
          <div class="todo-item" data-id="${t.id}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})">
            <span class="todo-text ${t.done ? 'done' : ''}" id="text-${t.id}">${escHtml(t.text)}</span>
            <div class="item-actions">
              <button title="编辑" onclick="startEdit(${t.id})">✏️</button>
              <button class="del-btn" title="删除" onclick="deleteTodo(${t.id})">🗑️</button>
            </div>
          </div>
        `).join('');
      }

      const doneCount = todos.filter(t => t.done).length;
      const activeCount = todos.length - doneCount;
      document.getElementById('countInfo').textContent =
        `未完成 ${activeCount} 项 / 共 ${todos.length} 项`;
      footer.style.display = todos.length ? 'flex' : 'none';
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTodo() {
      const input = document.getElementById('newTodo');
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (t) { t.done = !t.done; save(); render(); }
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function startEdit(id) {
      const el = document.getElementById('text-' + id);
      if (!el) return;
      el.contentEditable = 'true';
      el.focus();
      // 光标移到末尾
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);

      el.onblur = () => finishEdit(id, el);
      el.onkeydown = e => {
        if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
        if (e.key === 'Escape') { el.textContent = escHtml(todos.find(t=>t.id===id)?.text||''); el.blur(); }
      };
    }

    function finishEdit(id, el) {
      el.contentEditable = 'false';
      const newText = el.textContent.trim();
      const t = todos.find(t => t.id === id);
      if (t && newText) { t.text = newText; save(); }
      render();
    }

    document.getElementById('newTodo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
